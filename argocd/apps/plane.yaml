apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plane
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.plane.so/
    chart: plane-ce
    targetRevision: "1.4.1"
    helm:
      values: |
        planeVersion: v1.2.0

        ingress:
          enabled: true
          appHost: plane.voltafinancials.com
          ingressClass: traefik
          ingress_annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.tls: "true"

        ssl:
          tls_secret_name: plane-tls
          createIssuer: false
          generateCerts: false

        postgres:
          local_setup: false

        redis:
          local_setup: false

        rabbitmq:
          local_setup: true
          default_user: plane
          storageClass: nfs-hdd

        minio:
          local_setup: true
          root_user: plane-minio
          storageClass: nfs-hdd

        external_secrets:
          app_env_existingSecret: plane-app-secret
          doc_store_existingSecret: plane-app-secret
          live_env_existingSecret: plane-app-secret
          rabbitmq_existingSecret: plane-rabbitmq-secret
  destination:
    server: https://kubernetes.default.svc
    namespace: plane
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
