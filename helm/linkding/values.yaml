image:
  repository: sissbruecker/linkding
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 9090

ingress:
  host: links.192.168.68.150.nip.io

db:
  host: postgres.databases.svc.cluster.local
  port: "5432"
  name: linkding
  user: linkding

superuser:
  name: admin

existingSecret: linkding-db-secret

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: node-type
              operator: In
              values:
                - worker

topologySpread:
  enabled: true


autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

