image:
  repository: wallabag/wallabag
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80

ingress:
  host: read.192.168.68.150.nip.io

db:
  host: postgres.databases.svc.cluster.local
  port: "5432"
  name: wallabag
  user: wallabag

redis:
  host: redis-master.databases.svc.cluster.local
  port: "6379"

existingSecret: wallabag-db-secret

persistence:
  size: 5Gi
  nfs:
    server: 192.168.68.100
    path: /mnt/pve/BigData/k3s-shares/wallabag

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 250m

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: node-type
              operator: In
              values:
                - worker

topologySpread:
  enabled: true


autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

