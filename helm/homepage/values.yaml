image:
  repository: ghcr.io/gethomepage/homepage
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  type: NodePort
  nodePort: 30080
  port: 3000

ingress:
  enabled: true
  host: home.voltafinancials.com
  className: traefik

config:
  allowedHosts: home.voltafinancials.com,localhost
  title: Homelab
  kubernetes:
    mode: cluster
  services:
    - Media:
        - Jellyfin:
            href: https://jellyfin.voltafinancials.com
            icon: jellyfin.png
        - Transmission:
            href: https://torrent.voltafinancials.com
            icon: transmission.png
    - Reading:
        - CommaFeed:
            href: https://feed.voltafinancials.com
            icon: commafeed.png
            description: RSS reader
        - Wallabag:
            href: https://read.voltafinancials.com
            icon: wallabag.png
            description: Read-it-later
    - Security:
        - Vaultwarden:
            href: https://vault.voltafinancials.com
            icon: vaultwarden.png
    - Monitoring:
        - Grafana:
            href: https://grafana.voltafinancials.com
            icon: grafana.png
        - Prometheus:
            href: https://prometheus.voltafinancials.com
            icon: prometheus.png
    - Cluster:
        - ArgoCD:
            href: https://argo.voltafinancials.com
            icon: argocd.png
        - pgAdmin:
            href: https://pgadmin.voltafinancials.com
            icon: pgadmin.png
            description: PostgreSQL admin UI
        - Xtreme Downloader:
            href: https://xtreme.voltafinancials.com
            icon: download.png

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 512Mi

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: node-type
              operator: In
              values:
                - worker

topologySpread:
  enabled: true

