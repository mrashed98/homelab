image:
  repository: ghcr.io/athou/commafeed
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 8082

ingress:
  host: feed.192.168.68.150.nip.io

db:
  host: postgres.databases.svc.cluster.local
  port: "5432"
  name: commafeed
  user: commafeed

allowRegistrations: true

existingSecret: commafeed-db-secret

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m
